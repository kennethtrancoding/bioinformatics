name: bioinformatics
channels:
    - conda-forge
    - bioconda
    - defaults
dependencies:
    # Workflow orchestration
    - snakemake-minimal>=7.0.0

    # Python libraries. Only what the code imports: pandas, biopython, pyyaml,
    # click and tqdm were listed here and imported nowhere (snakemake pulls in
    # the ones it needs itself).
    - python=3.11
    - numpy>=1.24
    - requests>=2.28

    # Data processing
    - pigz>=2.6
    - curl>=7.0
