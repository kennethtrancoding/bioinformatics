# MobileElementFinder (mefinder) environment.
# Installs the LATEST MobileElementFinder from PyPI at env-build time; mefinder
# pulls its matching MGEdb (the mobile-element database) as a pip dependency, so a
# fresh `snakemake --use-conda` build always uses the current released db -- no
# static local database clone to go stale. Installs natively on arm64 (no Rosetta).
# Pin `MobileElementFinder==<version>` below if you need reproducible builds.
name: mefinder
channels:
    - conda-forge
    - bioconda
    - defaults
dependencies:
    - python=3.9
    - kma>=1.3
    - blast>=2.10
    - pip
    - pip:
          - MobileElementFinder
